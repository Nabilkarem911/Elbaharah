version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: elbharah_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: elbharah
      POSTGRES_USER: elbharah
      POSTGRES_PASSWORD: elbharah_prod_2026
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - elbharah_net

  backend:
    build: ./backend
    container_name: elbharah_backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PORT: 3000
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: elbharah
      DB_USER: elbharah
      DB_PASSWORD: elbharah_prod_2026
      JWT_SECRET: elbharah_jwt_secret_key_2026_change_in_production
      JWT_EXPIRES_IN: 24h
      CORS_ORIGIN: "*"
    ports:
      - "3000:3000"
    networks:
      - elbharah_net

  frontend:
    build: ./frontend
    container_name: elbharah_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - elbharah_net

volumes:
  pgdata:

networks:
  elbharah_net:
    driver: bridge
