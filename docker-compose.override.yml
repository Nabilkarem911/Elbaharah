services:
  db:
    image: postgres:16-alpine
    container_name: elbharah_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: elbharah
      POSTGRES_USER: elbharah
      POSTGRES_PASSWORD: elbharah_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elbharah"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - elbharah_net

  backend:
    environment:
      NODE_ENV: development
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: elbharah
      DB_USER: elbharah
      DB_PASSWORD: elbharah_dev
      JWT_SECRET: dev_secret_change_in_production
      CORS_ORIGIN: "*"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"

  frontend:
    ports:
      - "8080:80"

volumes:
  pgdata:
